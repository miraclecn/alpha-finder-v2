id = "medium_term_relative_strength"
name = "Medium-Term Relative Strength"
category = "price_trend"
signal_direction = "higher_is_better"
description = "Measure 3-to-12 week relative price strength while avoiding pure one-day gap chasing."
required_data = ["daily_bar", "adj_factor", "benchmark_membership", "industry_membership"]
preferred_horizon_days = [10, 30]
normalization = ["industry_neutral", "winsorize", "zscore"]
point_in_time_rule = "use_only_prices_and_classifications_known_at_trade_date_close"
failure_modes = ["one_day_gap_chase", "small_cap_liquidity_premium"]
