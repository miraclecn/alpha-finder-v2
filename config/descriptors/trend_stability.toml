id = "trend_stability"
name = "Trend Stability"
category = "price_trend"
signal_direction = "higher_is_better"
description = "Reward orderly trends with controlled pullbacks and penalize noisy, unstable price paths that tend to mean-revert violently."
required_data = ["daily_bar", "daily_basic"]
preferred_horizon_days = [10, 30]
normalization = ["cross_sectional", "winsorize", "zscore"]
point_in_time_rule = "use_only_history_visible_at_trade_date_close"
failure_modes = ["volatility_compression_before_break", "illiquid_smoothing"]
